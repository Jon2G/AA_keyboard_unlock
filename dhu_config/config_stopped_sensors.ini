# DHU Sensors Configuration File (Stopped State)
# ----------------------------------------------------
# NOTE: The [sensors] section ONLY enables or disables the simulation of those sensors
# on the head unit. All values in this section MUST be booleans (true/false, 1/0).
# Setting them to numeric values (like gear=101 or speed=15) causes parsing warnings 
# and fallback-disables the sensor entirely.
#
# To control sensor states and test driving restrictions at runtime, use the console 
# commands or keyboard shortcuts shown below.

[sensors]
# Enable the parking brake sensor (defaults to engaged/parked)
parking_brake = true

# Enable the gear sensor (defaults to Park)
gear = true

# Enable the speed sensor (defaults to 0 m/s)
speed = true

# Enable general driving status restrictions
driving_status = true

# ----------------------------------------------------
# RUNTIME SIMULATION & TESTING COMMANDS
# ----------------------------------------------------
# Type these commands in the terminal window running the DHU simulator:
#
# 1. Lock the Keyboard (Simulate Moving Restrictions):
#    Command:  restrict keyboard  (or restrict all)
#    Shortcut: Ctrl + 2          (or Shift + U)
#
# 2. Unlock the Keyboard (Simulate Parked State):
#    Command:  restrict none
#    Shortcut: U
#
# 3. Simulate Vehicle Speed (in meters per second):
#    Command:  speed 15
#    (Requires the speed sensor to be set to 'true' in this config file)
